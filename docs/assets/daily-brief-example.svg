<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" role="img" aria-labelledby="title description">
  <title id="title">Example objective-driven Daily Brief</title>
  <desc id="description">A Notion-style preview showing follow-up, connections, a blind spot, today's tasks, a learning topic, and a question.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#17231d" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="900" rx="20" fill="#f3f4f1"/>
  <rect width="1280" height="54" rx="20" fill="#202622"/>
  <rect y="34" width="1280" height="20" fill="#202622"/>
  <circle cx="25" cy="27" r="6" fill="#ef6a5b"/>
  <circle cx="45" cy="27" r="6" fill="#e8bf4f"/>
  <circle cx="65" cy="27" r="6" fill="#61c454"/>
  <rect x="444" y="15" width="392" height="25" rx="8" fill="#343b36"/>
  <text x="640" y="32" text-anchor="middle" fill="#cfd5d0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12">notion.so / Daily Brief</text>

  <rect x="0" y="54" width="238" height="846" fill="#e8eae6"/>
  <text x="28" y="94" fill="#232824" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">SECOND BRAIN</text>
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#4d554f">
    <rect x="15" y="116" width="208" height="36" rx="7" fill="#d9ddd8"/>
    <circle cx="34" cy="134" r="7" fill="#0f766e"/>
    <text x="52" y="139" fill="#202622" font-weight="650">Daily Brief</text>
    <circle cx="34" cy="174" r="7" fill="#7c3aed"/>
    <text x="52" y="179">Objectives</text>
    <circle cx="34" cy="214" r="7" fill="#2563eb"/>
    <text x="52" y="219">Tasks</text>
    <circle cx="34" cy="254" r="7" fill="#d97706"/>
    <text x="52" y="259">AI Inbox</text>
    <circle cx="34" cy="294" r="7" fill="#64748b"/>
    <text x="52" y="299">Notes</text>
  </g>
  <rect x="20" y="782" width="198" height="86" rx="10" fill="#f5f6f3" stroke="#d8dcd7"/>
  <text x="36" y="810" fill="#69716b" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700">GENERATED EVERY MORNING</text>
  <text x="36" y="834" fill="#303732" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">Objectives first</text>
  <text x="36" y="854" fill="#303732" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">Captures as evidence</text>

  <rect x="274" y="82" width="968" height="784" rx="16" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="310" y="112" width="102" height="25" rx="13" fill="url(#accent)"/>
  <text x="361" y="129" text-anchor="middle" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="750">EXAMPLE DATA</text>
  <text x="310" y="176" fill="#171b18" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="760">Daily Brief</text>
  <text x="310" y="202" fill="#7a827c" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">Monday, June 22, 2026 · Driven by 3 active objectives</text>
  <line x1="310" y1="224" x2="1204" y2="224" stroke="#e8ebe8"/>

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <circle cx="320" cy="257" r="10" fill="#dbeafe"/>
    <path d="M316 257h8M320 253v8" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
    <text x="342" y="263" fill="#202622" font-size="16" font-weight="720">Follow-up</text>
    <text x="342" y="288" fill="#4b534d" font-size="13.5">The onboarding guide is complete. “Interview three users” remains the priority</text>
    <text x="342" y="309" fill="#4b534d" font-size="13.5">because the objective still lacks external evidence.</text>

    <circle cx="320" cy="349" r="10" fill="#ccfbf1"/>
    <path d="M315 351l4-4 3 3 5-5" fill="none" stroke="#0f766e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="342" y="355" fill="#202622" font-size="16" font-weight="720">Connections</text>
    <text x="342" y="381" fill="#4b534d" font-size="13.5">Setup questions in the journal reveal onboarding friction, not missing features.</text>
    <text x="342" y="402" fill="#4b534d" font-size="13.5">A captured article suggests measuring the first successful brief instead of sign-up.</text>

    <rect x="310" y="431" width="894" height="82" rx="10" fill="#fff7ed" stroke="#fed7aa"/>
    <circle cx="332" cy="454" r="10" fill="#ffedd5"/>
    <text x="332" y="459" text-anchor="middle" fill="#c2410c" font-size="14" font-weight="800">!</text>
    <text x="354" y="459" fill="#9a3412" font-size="15" font-weight="720">Contradiction / blind spot</text>
    <text x="332" y="486" fill="#6b3d25" font-size="13.5">The objective says “validate first,” while the journal contains three new feature ideas.</text>

    <circle cx="320" cy="550" r="10" fill="#dcfce7"/>
    <path d="M315 550l4 4 7-9" fill="none" stroke="#15803d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="342" y="556" fill="#202622" font-size="16" font-weight="720">Today's tasks</text>

    <rect x="342" y="575" width="862" height="54" rx="9" fill="#f7f8f6" stroke="#e3e6e2"/>
    <rect x="356" y="589" width="66" height="26" rx="13" fill="#ede9fe"/>
    <text x="389" y="606" text-anchor="middle" fill="#6d28d9" font-size="11" font-weight="750">Projects</text>
    <text x="438" y="598" fill="#29302b" font-size="13.5" font-weight="650">Run two onboarding sessions</text>
    <text x="438" y="616" fill="#6b736d" font-size="12.5">Identify the first point where setup stalls</text>

    <rect x="342" y="639" width="862" height="54" rx="9" fill="#f7f8f6" stroke="#e3e6e2"/>
    <rect x="356" y="653" width="79" height="26" rx="13" fill="#dbeafe"/>
    <text x="395" y="670" text-anchor="middle" fill="#1d4ed8" font-size="11" font-weight="750">Knowledge</text>
    <text x="451" y="662" fill="#29302b" font-size="13.5" font-weight="650">Define one activation event</text>
    <text x="451" y="680" fill="#6b736d" font-size="12.5">Make validation measurable this week</text>

    <circle cx="320" cy="730" r="10" fill="#fef3c7"/>
    <path d="M320 723v8M316 729h8M318 734h4" fill="none" stroke="#b45309" stroke-width="1.8" stroke-linecap="round"/>
    <text x="342" y="736" fill="#202622" font-size="16" font-weight="720">To learn</text>
    <text x="342" y="760" fill="#4b534d" font-size="13.5">How activation metrics separate initial curiosity from recurring product value.</text>

    <circle cx="320" cy="806" r="10" fill="#f1f5f9"/>
    <text x="320" y="811" text-anchor="middle" fill="#475569" font-size="14" font-weight="800">?</text>
    <text x="342" y="812" fill="#202622" font-size="16" font-weight="720">Question to explore</text>
    <text x="342" y="836" fill="#4b534d" font-size="13.5">What smallest outcome makes this system part of a user's daily routine?</text>
  </g>
</svg>
